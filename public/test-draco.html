<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Draco GLB Load Test</title>
  <style>
    body { margin: 0; background: #111; color: #ddd; font-family: sans-serif; }
    #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px; z-index: 10; }
    canvas { display: block; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    const info = document.getElementById('info');

    async function main() {
      const canvas = document.createElement('canvas');
      document.body.appendChild(canvas);
      canvas.style.width = '100vw';
      canvas.style.height = '100vh';

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0c10);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.5, 3);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0.5, 0);
      controls.update();

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dir = new THREE.DirectionalLight(0xffffff, 1);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      // === KEY: Setup DRACOLoader pointing to our local served decoders ===
      const gltfLoader = new GLTFLoader();
      const dracoLoader = new DRACOLoader();
      // Use served local decoders (from /draco in this dev server)
      dracoLoader.setDecoderPath('/draco/');
      gltfLoader.setDRACOLoader(dracoLoader);

      const url = '/test-models/ems02.glb';
      info.innerHTML = `Loading compressed model:<br>${url}`;

      try {
        const gltf = await gltfLoader.loadAsync(url);
        const model = gltf.scene;

        // Auto-center for viewing
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3()).length();
        model.position.sub(center);
        scene.add(model);

        // Frame camera
        const dist = size * 1.2;
        camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
        controls.target.set(0, 0, 0);
        controls.update();

        info.innerHTML = `<span class="ok">SUCCESS</span> — Draco compressed GLB loaded and displayed.<br>Triangles: ~${countTris(model)}<br>Animations: ${gltf.animations.length}`;
        console.log('%c[DracoTest] Model loaded successfully', 'color:#4ade80', model);
      } catch (e) {
        info.innerHTML = `<span class="err">FAILED</span> to load compressed GLB.<br>See console for details.`;
        console.error('[DracoTest] Load failed:', e);
      }

      function countTris(obj) {
        let tris = 0;
        obj.traverse((c) => {
          if (c.isMesh && c.geometry) {
            const idx = c.geometry.index;
            tris += idx ? idx.count / 3 : (c.geometry.attributes.position.count / 3);
          }
        });
        return Math.round(tris);
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    main();
  </script>
</body>
</html>
